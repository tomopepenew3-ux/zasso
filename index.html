<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>雑草ハンター（仮）プロトタイプ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ゲージオーバーレイ: script.js が起動時に参照するので body の一番上に置く -->
<div id="gauge-overlay">
  <svg viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15" fill="rgba(0,0,0,0.35)" stroke="none"/>
    <circle class="gauge-circle" cx="18" cy="18" r="15"
      fill="none" stroke="#fff7d6" stroke-width="2.5"
      stroke-linecap="round" stroke-dasharray="0 100"
      transform="rotate(-90 18 18)"/>
  </svg>
  <span class="gauge-emoji" id="gaugeEmoji">🌟</span>
  <span class="gauge-push">Push!</span>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">🌱</span>
      <div>
        <div class="header-title">雑草ハンター（仮）</div>
        <div class="header-sub">プロトタイプ・はじまりの庭</div>
      </div>
    </div>
    <button class="zukan-btn" id="zukanOpenBtn">📖 図鑑 <span id="zukanCount">0/9</span></button>
  </div>

  <div class="progress-wrap">
    <div class="progress-row">
      <span>エリア達成率（はじまりの庭）</span>
      <span id="pctText" style="font-weight:700;">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="hint">✨光ってる草は長押しで抜こう／お花と木と家庭菜園は抜いちゃダメ</div>
  </div>

  <div class="field" id="field">
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    <div class="counter">🌱 抜いた草 <span id="clearedCount">0</span> / <span id="totalClearable">0</span></div>
    <button class="reset-btn" id="resetBtn">↺ 庭をリセット</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>変な草図鑑</h2>
      <button class="modal-close" id="zukanCloseBtn">✕</button>
    </div>
    <div id="zukanList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
