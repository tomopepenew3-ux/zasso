<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>雑草すっぽん！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ヘッダーエリア -->
        <div id="header">
            <h1 class="main-title">雑草すっぽん！</h1>
            <button id="zukanOpenBtn">📖 図鑑 <span id="zukanCount">0/9</span></button>
            
            <!-- エリア達成率ゲージ -->
            <div class="progress-container">
                <div class="progress-header">
                    <span id="progressLabel">エリア達成率（はじまりの庭）</span>
                    <span id="pctText">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>
                <div id="progressHint">✨ 光ってる草は長押しで抜こう／お花と木と家庭菜園は抜いちゃダメ</div>
            </div>
        </div>

        <!-- メインの庭（草むしり画面） -->
        <main id="field">
            <div id="grid"></div>
        </main>

        <!-- フッターエリア -->
        <div id="footer">
            <div class="counter">
                🌱 抜いた草 <span id="clearedCount">0</span> / <span id="totalClearable">156</span>
            </div>
            <button id="muteBtn">🔊 音あり</button>
            <button id="resetBtn">🔄 庭をリセット</button>
        </div>
    </div>

    <!-- 図鑑ポップアップ（モーダル） -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>レア草図鑑</h2>
                <button id="zukanCloseBtn">❌ 閉じる</button>
            </div>
            <div id="zukanList"></div>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
