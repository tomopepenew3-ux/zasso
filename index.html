<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雑草すっぽん！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <div class="title-area">
                <span class="main-title">雑草すっぽん！</span>
                <span class="sub-title">プロトタイプ・はじまりの庭</span>
            </div>
            <button id="zukanOpenBtn">📖 図鑑 <span id="zukanCount">0/9</span></button>
        </div>

        <div id="progress-area">
            <div class="progress-labels">
                <span id="progressLabel">エリア達成率（はじまりの庭）</span>
                <span id="pctText">0%</span>
            </div>
            <div id="progressGauge">
                <div id="progressFill"></div>
            </div>
            <div id="progressHint">✨ 光ってる草は長押しで抜こう／お花と木と家庭菜園は抜いちゃダメ</div>
        </div>

        <div id="field">
            <div id="grid"></div>
        </div>

        <div id="footer">
            <div class="counter-area">
                🌱 抜いた草 <span id="clearedCount">0</span> / <span id="totalClearable">156</span>
            </div>
            <div class="btn-group">
                <button id="muteBtn">🔊 音あり</button>
                <button id="resetBtn">🔄 庭をリセット</button>
            </div>
        </div>
    </div>

    <div id="modalOverlay">
        <div id="modalBox">
            <h2>🌱 雑草図鑑</h2>
            <div id="zukanList"></div>
            <button id="zukanCloseBtn">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
